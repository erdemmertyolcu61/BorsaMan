name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── JS: lint + vitest + coverage ─────────────────────────────────────
  test-js:
    name: JS — test + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Lint (non-blocking warning gate)
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage -- --reporter=default --reporter=junit --outputFile=./junit.xml

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
          retention-days: 14

      - name: Upload junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml
          path: junit.xml
          retention-days: 7

      - name: Coverage summary in PR
        if: github.event_name == 'pull_request'
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "const s=require('./coverage/coverage-summary.json').total;console.log('| Metric | % |');console.log('|---|---|');for(const k of ['lines','statements','functions','branches'])console.log('| '+k+' | '+s[k].pct+'% |');" > coverage.md
            cat coverage.md >> $GITHUB_STEP_SUMMARY
          fi

  # ─── Vite production build smoke test ─────────────────────────────────
  build-web:
    name: Web — vite build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test-js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 7

  # ─── Python: bist_bridge unit tests ───────────────────────────────────
  test-python:
    name: Python — bist_bridge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pandas mcp
          # borsapy is optional at test time — tests must mock it
          pip install borsapy || echo "borsapy install skipped (offline) — tests must mock"

      - name: Run pytest
        run: |
          if [ -f bist_bridge.py ]; then
            pytest tests/ -v --tb=short || pytest -v --tb=short
          else
            echo "bist_bridge.py not found — skipping"
          fi

  # ─── Gate job for branch protection ───────────────────────────────────
  ci-gate:
    name: CI gate
    needs: [test-js, build-web, test-python]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Fail if any dependency failed
        run: |
          if [ "${{ needs.test-js.result }}" != "success" ] || \
             [ "${{ needs.build-web.result }}" != "success" ] || \
             [ "${{ needs.test-python.result }}" != "success" ]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed"
