<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BIST · AI Trading Terminal v2</title>
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="icon" type="image/x-icon" href="/icons/icon.ico" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00e676">

  <!-- iOS PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BIST AI">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <!-- iOS Splash Screens (common sizes) -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Data fetch preconnects — saves 100-300ms TLS/DNS handshake on first call -->
  <link rel="preconnect" href="https://query1.finance.yahoo.com" crossorigin>
  <link rel="preconnect" href="https://query2.finance.yahoo.com" crossorigin>
  <link rel="preconnect" href="https://bigpara.hurriyet.com.tr" crossorigin>
  <link rel="preconnect" href="https://www.isyatirim.com.tr" crossorigin>
  <link rel="preconnect" href="https://api.allorigins.win" crossorigin>
  <link rel="preconnect" href="https://corsproxy.io" crossorigin>
  <link rel="dns-prefetch" href="https://fc.yahoo.com">
  <link rel="dns-prefetch" href="https://api.kap.org.tr">

  <style>
    /* iOS safe area support */
    body { padding-top: env(safe-area-inset-top); }
    /* Prevent iOS text size adjust */
    html { -webkit-text-size-adjust: 100%; }
    /* Smooth scrolling */
    * { -webkit-overflow-scrolling: touch; }
    /* Prevent pull-to-refresh on iOS */
    body { overscroll-behavior-y: contain; }
    /* iOS standalone status bar area */
    @media all and (display-mode: standalone) {
      body { padding-top: env(safe-area-inset-top); }
    }
    /* PWA splash / loading state before JS loads */
    #splash {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      background: #06090f; z-index: 999999;
      transition: opacity 0.4s ease-out;
    }
    #splash-text {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 32px; font-weight: 700; color: #00e676;
      animation: splashPulse 1.5s ease-in-out infinite;
      letter-spacing: 2px;
    }
    @keyframes splashPulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-text">BORSAMAN</div>
  </div>
  <div id="root"></div>
  <script>
    // Splash ekranının biraz daha uzun süre ekranda kalması için
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 400);
        }
      }, 1500);
    });
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
